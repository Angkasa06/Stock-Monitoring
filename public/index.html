<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Stock Monitoring System – Login Portal untuk Kasir, Admin, dan Boss" />
  <title>Login – Stock Monitoring System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/css/login.css" />
</head>

<body>

  <!-- ── Animated Background ───────────────────────── -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-orb orb-1" aria-hidden="true"></div>
  <div class="bg-orb orb-2" aria-hidden="true"></div>
  <div class="bg-orb orb-3" aria-hidden="true"></div>

  <!-- ── Particles ─────────────────────────────────── -->
  <canvas id="particles-canvas" aria-hidden="true"></canvas>

  <!-- ── Main Container ────────────────────────────── -->
  <main class="main-wrapper">

    <!-- Centered Login Panel -->
    <section class="login-panel" aria-label="Form Login">

      <!-- Brand Logo di atas card -->
      <div class="brand-logo-top">
        <div class="logo-icon">
          <svg width="32" height="32" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true">
            <rect width="40" height="40" rx="12" fill="url(#logo-gradient2)" />
            <path d="M10 28L16 16L22 22L28 12" stroke="white" stroke-width="2.5" stroke-linecap="round"
              stroke-linejoin="round" />
            <circle cx="28" cy="12" r="3" fill="white" />
            <path d="M10 32H30" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5" />
            <defs>
              <linearGradient id="logo-gradient2" x1="0" y1="0" x2="40" y2="40">
                <stop offset="0%" stop-color="#6366f1" />
                <stop offset="100%" stop-color="#8b5cf6" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="brand-name">
          <span class="brand-title">StockMonitor</span>
          <span class="brand-subtitle">Management System</span>
        </div>
      </div>

      <div class="login-card">
        <!-- Header -->
        <div class="login-header">
          <div class="login-icon-wrap" aria-hidden="true">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </div>
          <h1 class="login-title">Selamat Datang</h1>
          <p class="login-subtitle">Masuk ke sistem menggunakan ID karyawan Anda</p>
        </div>

        <!-- Role Detector (hidden, kept for JS compatibility) -->
        <div id="role-detector" style="display:none" aria-hidden="true">
          <span id="role-detector-text"></span>
          <span id="role-detector-badge" class="role-detector-badge"></span>
        </div>

        <!-- Form -->
        <form id="login-form" class="login-form" novalidate autocomplete="off" aria-label="Form Login">

          <!-- Username Field -->
          <div class="form-group">
            <label for="username" class="form-label">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
              ID Karyawan (Username)
            </label>
            <div class="input-wrapper">
              <input type="text" id="username" name="username" class="form-input" maxlength="8" minlength="8"
                pattern="\d{8}" inputmode="numeric" autocomplete="off" required aria-required="true"
                aria-describedby="username-error" />
              <!-- Digit Group Visual (hidden) -->
              <div class="digit-groups" aria-hidden="true" style="display:none!important">
                <span class="digit-group" data-label="Kota">__</span>
                <span class="digit-sep">·</span>
                <span class="digit-group" data-label="Cabang">__</span>
                <span class="digit-sep">·</span>
                <span class="digit-group" data-label="Role">__</span>
                <span class="digit-sep">·</span>
                <span class="digit-group" data-label="No.">__</span>
              </div>
            </div>
            <p id="username-error" class="form-error" role="alert" aria-live="polite"></p>
          </div>

          <!-- Password Field -->
          <div class="form-group">
            <label for="password" class="form-label">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              Password
            </label>
            <div class="input-wrapper">
              <input type="password" id="password" name="password" class="form-input" minlength="8"
                autocomplete="current-password" required aria-required="true" aria-describedby="password-error" />
              <button type="button" id="toggle-password" class="toggle-password"
                aria-label="Tampilkan atau sembunyikan password">
                <svg id="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <svg id="icon-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"
                  style="display:none">
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>
            <p id="password-error" class="form-error" role="alert" aria-live="polite"></p>
          </div>

          <!-- Password Strength Indicator -->
          <div class="strength-wrap" id="strength-wrap" aria-hidden="true">
            <div class="strength-bars">
              <div class="strength-bar" id="bar-1"></div>
              <div class="strength-bar" id="bar-2"></div>
              <div class="strength-bar" id="bar-3"></div>
              <div class="strength-bar" id="bar-4"></div>
            </div>
            <span class="strength-label" id="strength-label"></span>
          </div>

          <!-- Submit Button -->
          <button type="submit" id="btn-login" class="btn-login" aria-label="Login ke sistem">
            <span id="btn-text">Masuk</span>
            <svg id="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
              <polyline points="10 17 15 12 10 7" />
              <line x1="15" y1="12" x2="3" y2="12" />
            </svg>
            <svg id="btn-spinner" class="btn-spinner" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"
              style="display:none">
              <path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z" opacity="0.25" />
              <path d="M12 3a9 9 0 0 1 9 9" />
            </svg>
          </button>

          <!-- Alert Message -->
          <div id="alert-box" class="alert-box" role="alert" aria-live="assertive" aria-atomic="true"
            style="display:none"></div>

        </form>

        <!-- Footer -->
        <div class="login-footer">
          <p class="footer-note">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
            Sistem dilindungi enkripsi &amp; audit trail
          </p>
          <p class="footer-contact">Lupa password? Hubungi Admin</p>
        </div>
      </div>

      <!-- Clock -->
      <div class="clock-widget" aria-label="Waktu saat ini">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10" />
          <polyline points="12 6 12 12 16 14" />
        </svg>
        <span id="clock-time">--:--:--</span>
        <span id="clock-date"></span>
      </div>
    </section>

  </main>

  <script src="/js/login.js?v=2"></script>
</body>

</html>
